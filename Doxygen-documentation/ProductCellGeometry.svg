<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Prod Sign -->
  <text x="100" y="150" font-family="serif" font-size="80" text-anchor="middle" fill="#2c3e50">&#x220F;</text>

  <!-- Over Cell -->
  <rect x="70" y="40" width="60" height="30" rx="3" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" />
  <text x="100" y="60" font-family="serif" font-style="italic" font-size="14" text-anchor="middle" fill="#7b241c">over</text>

  <!-- Under Cell -->
  <rect x="70" y="160" width="60" height="30" rx="3" fill="#d5f5e3" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2" />
  <text x="100" y="180" font-family="serif" font-style="italic" font-size="14" text-anchor="middle" fill="#145a32">under</text>

  <!-- Base Cell -->
  <rect x="160" y="100" width="180" height="100" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="250" y="155" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">base</text>

  <!-- Labels -->
  <text x="200" y="20" font-family="sans-serif" font-size="16" text-anchor="middle" font-weight="bold">ProductCell Geometry</text>

  <!-- Baseline -->
  <line x1="30" y1="150" x2="370" y2="150" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="360" y="145" font-family="sans-serif" font-size="10" fill="#7f8c8d">Baseline</text>

</svg>
