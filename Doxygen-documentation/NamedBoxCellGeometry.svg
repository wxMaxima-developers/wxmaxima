<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Box Lines -->
  <!-- Top Left -->
  <line x1="50" y1="60" x2="140" y2="60" stroke="#2c3e50" stroke-width="2" />
  <!-- Top Right -->
  <line x1="260" y1="60" x2="350" y2="60" stroke="#2c3e50" stroke-width="2" />
  <!-- Left -->
  <line x1="50" y1="60" x2="50" y2="200" stroke="#2c3e50" stroke-width="2" />
  <!-- Right -->
  <line x1="350" y1="60" x2="350" y2="200" stroke="#2c3e50" stroke-width="2" />
  <!-- Bottom -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#2c3e50" stroke-width="2" />

  <!-- Name Label -->
  <rect x="150" y="45" width="100" height="30" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" />
  <text x="200" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#7d6608">boxname</text>

  <!-- Content -->
  <rect x="70" y="80" width="260" height="100" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="200" y="135" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">content</text>

  <!-- Labels -->
  <text x="200" y="30" font-family="sans-serif" font-size="16" text-anchor="middle" font-weight="bold">NamedBoxCell Geometry</text>

  <!-- Center/Baseline -->
  <line x1="30" y1="130" x2="370" y2="130" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="360" y="125" font-family="sans-serif" font-size="10" fill="#7f8c8d">Baseline</text>

</svg>
