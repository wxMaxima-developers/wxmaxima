<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Diff Part Box -->
  <rect x="50" y="40" width="100" height="80" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" stroke-dasharray="2,2" />
  <text x="100" y="85" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#7d6608">&#x2202;/&#x2202;x</text>

  <!-- Base Box -->
  <rect x="150" y="30" width="150" height="100" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="225" y="85" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">function</text>

  <!-- Title/Label -->
  <text x="200" y="20" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Partial Derivative Variant</text>

  <!-- Baseline -->
  <line x1="15" y1="80" x2="380" y2="80" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="350" y="75" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline</text>

</svg>
