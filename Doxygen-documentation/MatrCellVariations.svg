<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <style>
    .title { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: sans-serif; font-size: 12px; fill: #7f8c8d; }
    .matrix { font-family: serif; font-size: 18px; text-anchor: middle; }
    .bracket { stroke: #2c3e50; stroke-width: 1.5; fill: none; }
    .separator { stroke: #e74c3c; stroke-width: 1; stroke-dasharray: 2,2; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- 1. Rounded Parenthesis (Default) -->
  <g transform="translate(50, 40)">
    <text x="0" y="0" class="title">1. Rounded (paren_rounded)</text>
    <path d="M 20 20 Q 10 50 20 80" class="bracket" />
    <path d="M 80 20 Q 90 50 80 80" class="bracket" />
    <text x="50" y="45" class="matrix">a  b</text>
    <text x="50" y="70" class="matrix">c  d</text>
  </g>

  <!-- 2. Square Brackets -->
  <g transform="translate(250, 40)">
    <text x="0" y="0" class="title">2. Brackets (paren_brackets)</text>
    <path d="M 25 20 L 15 20 L 15 80 L 25 80" class="bracket" />
    <path d="M 75 20 L 85 20 L 85 80 L 75 80" class="bracket" />
    <text x="50" y="45" class="matrix">a  b</text>
    <text x="50" y="70" class="matrix">c  d</text>
  </g>

  <!-- 3. Angled Brackets -->
  <g transform="translate(450, 40)">
    <text x="0" y="0" class="title">3. Angled (paren_angled)</text>
    <path d="M 25 20 L 15 50 L 25 80" class="bracket" />
    <path d="M 75 20 L 85 50 L 75 80" class="bracket" />
    <text x="50" y="45" class="matrix">a  b</text>
    <text x="50" y="70" class="matrix">c  d</text>
  </g>

  <!-- 4. Straight Lines (Determinant style) -->
  <g transform="translate(50, 160)">
    <text x="0" y="0" class="title">4. Straight (paren_straight)</text>
    <line x1="15" y1="20" x2="15" y2="80" class="bracket" />
    <line x1="85" y1="20" x2="85" y2="80" class="bracket" />
    <text x="50" y="45" class="matrix">a  b</text>
    <text x="50" y="70" class="matrix">c  d</text>
  </g>

  <!-- 5. No Parenthesis -->
  <g transform="translate(250, 160)">
    <text x="0" y="0" class="title">5. None (paren_none)</text>
    <text x="50" y="45" class="matrix">a  b</text>
    <text x="50" y="70" class="matrix">c  d</text>
  </g>

  <!-- 6. Special Matrix with Headings -->
  <g transform="translate(50, 280)">
    <text x="0" y="0" class="title">6. Special with Headings (m_rowNames, m_colNames)</text>
    <rect x="15" y="20" width="150" height="80" fill="#f9f9f9" stroke="#ccc" />
    
    <!-- Header Row -->
    <text x="45" y="45" class="matrix" font-weight="bold">C1</text>
    <text x="105" y="45" class="matrix" font-weight="bold">C2</text>
    <line x1="15" y1="55" x2="165" y2="55" class="bracket" stroke-width="1" />
    
    <!-- Row Names and Data -->
    <text x="45" y="75" class="matrix" font-weight="bold">R1</text>
    <line x1="75" y1="20" x2="75" y2="100" class="bracket" stroke-width="1" />
    <text x="105" y="75" class="matrix">data</text>
    <text x="105" y="95" class="matrix">...</text>
    
    <text x="180" y="60" class="label">Separators drawn when m_specialMatrix is true</text>
  </g>

</svg>
