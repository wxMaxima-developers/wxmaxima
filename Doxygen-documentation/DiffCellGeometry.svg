<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Diff Part Box -->
  <rect x="50" y="40" width="100" height="80" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" stroke-dasharray="2,2" />
  <text x="100" y="85" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#7d6608">d/dx</text>

  <!-- Base Box -->
  <rect x="150" y="30" width="150" height="100" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="225" y="85" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">function</text>

  <!-- Total Height -->
  <line x1="20" y1="30" x2="20" y2="130" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="10" y="80" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 10,80)">GetHeight()</text>

  <!-- Sub-cell Heights -->
  <line x1="310" y1="30" x2="310" y2="130" stroke="#2980b9" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="315" y="80" font-family="sans-serif" font-size="9" fill="#2980b9">Base::GetHeightList()</text>

  <line x1="40" y1="40" x2="40" y2="120" stroke="#f39c12" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="35" y="80" font-family="sans-serif" font-size="9" text-anchor="middle" transform="rotate(-90 35,80)" fill="#f39c12">Diff::GetHeightList()</text>

  <!-- Baseline -->
  <line x1="15" y1="80" x2="380" y2="80" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="350" y="75" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline</text>

</svg>
