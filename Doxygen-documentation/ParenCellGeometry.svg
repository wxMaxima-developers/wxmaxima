<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Brackets -->
  <path d="M 100 40 C 80 40 80 160 100 160" fill="none" stroke="#2c3e50" stroke-width="2" />
  <path d="M 300 40 C 320 40 320 160 300 160" fill="none" stroke="#2c3e50" stroke-width="2" />

  <!-- Inner Box -->
  <rect x="110" y="50" width="180" height="100" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="200" y="105" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">inner content</text>

  <!-- Baseline -->
  <line x1="60" y1="100" x2="340" y2="100" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="320" y="95" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline</text>

  <text x="200" y="190" font-family="sans-serif" font-size="10" fill="black" text-anchor="middle">m_center = m_height / 2</text>

</svg>
