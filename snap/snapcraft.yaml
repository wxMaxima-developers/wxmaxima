name: wxmaxima
version: 26.07.0-0
summary: A nightly build of wxMaxima, a gui for Maxima, a full-featured CAS.
description: wxMaxima is a quite full-featured graphical user interface for Maxima.
confinement: strict
grade: stable
base: core24
license: GPL-2.0+
architectures:
   - build-on: arm64
   - build-on: armhf
   - build-on: amd64
   - build-on: ppc64el
   - build-on: s390x

apps:
  wxmaxima:
    extensions: [gnome]
    command: usr/bin/wxmaxima
    desktop: usr/share/applications/io.github.wxmaxima_developers.wxMaxima.desktop
    plugs: [network, network-bind, home, removable-media, optical-drive, process-control, cups-control, upower-observe]
      # gtk-3-themes:
      #   interface: content
      #   target: $SNAP/data-dir/themes
      #   default-provider: gtk-common-themes
      # icon-themes:
      #   interface: content
      #   target: $SNAP/data-dir/icons
      #   default-provider: gtk-common-themes

parts:
  wxmaxima:
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
    source: https://github.com/wxMaxima-developers/wxmaxima.git
    # core24 == Ubuntu 24.04 (noble), which ships wxWidgets 3.2 (not 3.0) and
    # applied the 64-bit time_t transition, so the runtime libraries carry the
    # "t64" suffix. These names mirror the wxWidgets 3.2 packages the Ubuntu CI
    # job builds against. (The old 3.0 names silently broke the snap when the
    # base was bumped to core24.)
    build-packages:
     - libwxgtk3.2-dev
     - libwxgtk-webview3.2-dev
     - gettext
    stage-snaps:
     - maxima
    stage-packages:
     - libwxbase3.2-1t64
     - libwxgtk3.2-1t64
     - libwxgtk-webview3.2-1t64
     - libglu1-mesa
     - wx-common
     - gettext
     - locales-all
    stage:
     - -usr/share/texmf/ls-R
 
