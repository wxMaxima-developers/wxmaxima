<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="150" viewBox="0 0 500 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Numerator Box -->
  <rect x="100" y="40" width="100" height="60" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="150" y="75" font-family="serif" font-style="italic" font-size="20" text-anchor="middle" fill="#2c3e50">num</text>

  <!-- Divide Sign -->
  <text x="220" y="75" font-family="serif" font-size="30" text-anchor="middle" fill="#2c3e50">/</text>

  <!-- Denominator Box -->
  <rect x="250" y="40" width="100" height="60" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" stroke-dasharray="4,2" />
  <text x="300" y="75" font-family="serif" font-style="italic" font-size="20" text-anchor="middle" fill="#2c3e50">denom</text>

  <!-- Baseline (point.y) -->
  <line x1="50" y1="75" x2="450" y2="75" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="380" y="85" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline (point.y)</text>

  <!-- Total Height -->
  <line x1="20" y1="20" x2="20" y2="120" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="10" y="70" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 10,70)">GetHeight()</text>

  <!-- Center -->
  <line x1="40" y1="20" x2="40" y2="75" stroke="black" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="45" y="45" font-family="sans-serif" font-size="10">GetCenter()</text>

</svg>
