<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f9f9f9" />
  
  <!-- Worksheet Title -->
  <text x="400" y="30" font-family="sans-serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#333">Worksheet Layout Overview</text>

  <!-- Base Indent (Top Margin) -->
  <line x1="0" y1="60" x2="800" y2="60" stroke="#ccc" stroke-dasharray="5,5" />
  <line x1="780" y1="0" x2="780" y2="60" stroke="black" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="770" y="35" font-family="sans-serif" font-size="12" text-anchor="end">GetBaseIndent()</text>

  <!-- Left Margin / Indent Area -->
  <rect x="0" y="60" width="120" height="540" fill="#eee" fill-opacity="0.5" />
  <text x="60" y="580" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#666">Margin / Indent Area</text>

  <!-- Indent Line -->
  <line x1="120" y1="60" x2="120" y2="600" stroke="#3498db" stroke-width="2" stroke-dasharray="10,5" />
  <text x="125" y="590" font-family="sans-serif" font-size="12" fill="#3498db" font-weight="bold">GetIndent()</text>

  <!-- Bracket Width -->
  <line x1="90" y1="70" x2="120" y2="70" stroke="black" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="105" y="65" font-family="sans-serif" font-size="10" text-anchor="middle">BracketWidth()</text>

  <!-- GroupCell 1 -->
  <g transform="translate(120, 80)">
    <!-- Bracket -->
    <path d="M -20 0 L -30 0 L -30 150 L -20 150" fill="none" stroke="#2c3e50" stroke-width="2" />
    
    <!-- Input Label -->
    <rect x="0" y="0" width="80" height="30" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" />
    <text x="5" y="20" font-family="sans-serif" font-size="12" fill="#2980b9">%i1</text>
    <text x="40" y="45" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#666">m_inputLabel</text>

    <!-- GetInputIndent() -->
    <line x1="0" y1="35" x2="100" y2="35" stroke="black" marker-start="url(#arrow)" marker-end="url(#arrow)" />
    <text x="50" y="45" font-family="sans-serif" font-size="10" text-anchor="middle">GetInputIndent()</text>

    <!-- Input Content -->
    <rect x="100" y="0" width="500" height="40" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" />
    <text x="110" y="25" font-family="monospace" font-size="14" fill="#7d6608">integrate(sin(x), x);</text>
    <text x="350" y="55" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#666">Input Content (EditorCell)</text>

    <!-- Output -->
    <rect x="100" y="70" width="200" height="60" fill="#d5f5e3" stroke="#27ae60" stroke-width="1" />
    <text x="200" y="105" font-family="serif" font-size="18" text-anchor="middle" fill="#145a32">-cos(x)</text>
    <text x="200" y="145" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#666">Output Content</text>
    
    <!-- m_center line -->
    <line x1="-50" y1="20" x2="650" y2="20" stroke="#95a5a6" stroke-dasharray="2,2" />
    <text x="655" y="25" font-family="sans-serif" font-size="10" fill="#95a5a6">m_center (Baseline)</text>

    <!-- Group Height -->
    <line x1="-40" y1="0" x2="-40" y2="150" stroke="black" marker-start="url(#arrow)" marker-end="url(#arrow)" />
    <text x="-45" y="75" font-family="sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 -45,75)">Group Height</text>
  </g>

  <!-- Group Skip -->
  <line x1="400" y1="230" x2="400" y2="260" stroke="black" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="410" y="250" font-family="sans-serif" font-size="12">GetGroupSkip()</text>

  <!-- GroupCell 2 -->
  <g transform="translate(120, 260)">
    <!-- Bracket -->
    <path d="M -20 0 L -30 0 L -30 100 L -20 100" fill="none" stroke="#2c3e50" stroke-width="2" />
    
    <!-- Input Label -->
    <rect x="0" y="0" width="80" height="30" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" />
    <text x="5" y="20" font-family="sans-serif" font-size="12" fill="#2980b9">%i2</text>

    <!-- Input Content -->
    <rect x="100" y="0" width="500" height="40" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" />
    <text x="110" y="25" font-family="monospace" font-size="14" fill="#7d6608">plot2d(sin(x), [x, -5, 5]);</text>

    <!-- Output (Image) -->
    <rect x="100" y="50" width="300" height="40" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" />
    <text x="250" y="75" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#7b241c">[Image Output]</text>
  </g>

  <!-- Legend -->
  <rect x="550" y="450" width="230" height="130" fill="white" stroke="#ccc" rx="5" />
  <text x="560" y="470" font-family="sans-serif" font-size="14" font-weight="bold">Legend</text>
  <rect x="565" y="485" width="15" height="15" fill="#fcf3cf" stroke="#f1c40f" />
  <text x="590" y="497" font-family="sans-serif" font-size="12">Input Area</text>
  <rect x="565" y="510" width="15" height="15" fill="#d5f5e3" stroke="#27ae60" />
  <text x="590" y="522" font-family="sans-serif" font-size="12">Output Area</text>
  <rect x="565" y="535" width="15" height="15" fill="#e8f4f8" stroke="#2980b9" />
  <text x="590" y="547" font-family="sans-serif" font-size="12">Labels (%i, %o)</text>
  <line x1="565" y1="565" x2="580" y2="565" stroke="#3498db" stroke-width="2" stroke-dasharray="5,2" />
  <text x="590" y="569" font-family="sans-serif" font-size="12">Indentation Line</text>

</svg>
