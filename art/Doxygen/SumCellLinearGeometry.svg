<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="150" viewBox="0 0 500 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Linear sum representation -->
  <text x="50" y="75" font-family="serif" font-size="24" fill="#2c3e50">sum(</text>
  
  <!-- f(i) -->
  <rect x="100" y="45" width="50" height="40" fill="#e8f4f8" stroke="#2980b9" />
  <text x="125" y="72" font-family="serif" font-style="italic" font-size="18" text-anchor="middle">f(i)</text>
  
  <text x="155" y="75" font-family="serif" font-size="24" fill="#2c3e50">,</text>
  
  <!-- i -->
  <rect x="170" y="45" width="20" height="40" fill="#fcf3cf" stroke="#f1c40f" />
  <text x="180" y="72" font-family="serif" font-style="italic" font-size="18" text-anchor="middle">i</text>
  
  <text x="195" y="75" font-family="serif" font-size="24" fill="#2c3e50">,</text>
  
  <!-- low -->
  <rect x="210" y="45" width="40" height="40" fill="#d5f5e3" stroke="#27ae60" />
  <text x="230" y="72" font-family="serif" font-style="italic" font-size="18" text-anchor="middle">low</text>
  
  <text x="255" y="75" font-family="serif" font-size="24" fill="#2c3e50">,</text>
  
  <!-- high -->
  <rect x="270" y="45" width="40" height="40" fill="#fadbd8" stroke="#e74c3c" />
  <text x="290" y="72" font-family="serif" font-style="italic" font-size="18" text-anchor="middle">high</text>
  
  <text x="315" y="75" font-family="serif" font-size="24" fill="#2c3e50">)</text>

  <!-- Baseline -->
  <line x1="20" y1="75" x2="480" y2="75" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="410" y="85" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline</text>

  <!-- Total Height -->
  <line x1="15" y1="20" x2="15" y2="120" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="8" y="70" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 8,70)">GetHeight()</text>

</svg>
