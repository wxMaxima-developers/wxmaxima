<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Base Box -->
  <rect x="80" y="40" width="80" height="60" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="120" y="75" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">base</text>

  <!-- Index Box -->
  <rect x="155" y="80" width="60" height="40" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" stroke-dasharray="2,2" />
  <text x="185" y="105" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#7d6608">index</text>

  <!-- Total Height -->
  <line x1="20" y1="40" x2="20" y2="120" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="10" y="80" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 10,80)">GetHeight()</text>

  <!-- Base Drop -->
  <line x1="120" y1="70" x2="120" y2="100" stroke="#2980b9" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="125" y="90" font-family="sans-serif" font-size="8" fill="#2980b9">Base::GetMaxDrop()</text>

  <!-- Index Height -->
  <line x1="230" y1="80" x2="230" y2="120" stroke="#f39c12" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="235" y="100" font-family="sans-serif" font-size="8" fill="#f39c12">Index::GetHeightList()</text>

  <!-- Baseline -->
  <line x1="15" y1="70" x2="350" y2="70" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="310" y="65" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline (point.y)</text>

</svg>
