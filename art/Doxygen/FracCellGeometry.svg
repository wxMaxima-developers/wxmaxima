<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Numerator Box -->
  <rect x="150" y="20" width="100" height="60" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="200" y="55" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">numerator</text>

  <!-- Denominator Box -->
  <rect x="150" y="105" width="100" height="60" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" stroke-dasharray="4,2" />
  <text x="200" y="140" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">denominator</text>

  <!-- Fraction Line -->
  <line x1="130" y1="88" x2="270" y2="88" stroke="#2c3e50" stroke-width="2" />
  <text x="280" y="93" font-family="sans-serif" font-size="10" fill="#2c3e50">Fraction Line (point.y + Scale_Px(2))</text>

  <!-- Baseline -->
  <line x1="30" y1="80" x2="350" y2="80" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="310" y="75" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline (point.y)</text>

  <!-- Gaps -->
  <line x1="200" y1="80" x2="200" y2="88" stroke="#e74c3c" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="205" y="86" font-family="sans-serif" font-size="8" fill="#e74c3c">Scale_Px(2)</text>

  <line x1="200" y1="88" x2="200" y2="105" stroke="#e74c3c" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="205" y="100" font-family="sans-serif" font-size="8" fill="#e74c3c">Scale_Px(2) + ?</text>
  <!-- Actually the code is:
       num.y = point.y - m_displayedNum->GetMaxDrop()
       antialiassingDC->DrawLine(..., point.y + Scale_Px(2), ...)
       denom.y = point.y + m_displayedDenom->GetCenterList() + Scale_Px(4)
       
       Gap between num bottom (num.y + MaxDrop = point.y) and line is Scale_Px(2).
       Gap between line and denom top (denom.y - CenterList = point.y + Scale_Px(4)) is Scale_Px(2).
  -->

  <line x1="260" y1="55" x2="260" y2="80" stroke="black" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="265" y="70" font-family="sans-serif" font-size="9">Num::GetMaxDrop()</text>

  <line x1="260" y1="88" x2="260" y2="135" stroke="black" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="265" y="115" font-family="sans-serif" font-size="9">Denom::GetCenterList() + Scale_Px(2)</text>

</svg>
