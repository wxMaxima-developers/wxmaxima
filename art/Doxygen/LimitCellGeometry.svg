<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="450" height="200" viewBox="0 0 450 200">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Name Box (limit) -->
  <rect x="80" y="60" width="80" height="40" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="120" y="85" font-family="serif" font-style="italic" font-size="20" text-anchor="middle" fill="#2c3e50">limit</text>

  <!-- Under Box (subscript) -->
  <rect x="80" y="105" width="80" height="40" rx="3" fill="#fcf3cf" stroke="#f1c40f" stroke-width="1" stroke-dasharray="2,2" />
  <text x="120" y="130" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#7d6608">under</text>

  <!-- Base Box -->
  <rect x="170" y="50" width="100" height="100" rx="3" fill="#e8f4f8" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,2" />
  <text x="220" y="105" font-family="serif" font-style="italic" font-size="24" text-anchor="middle" fill="#2c3e50">base</text>

  <!-- Total Height -->
  <line x1="20" y1="50" x2="20" y2="150" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="10" y="100" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 10,100)">GetHeight()</text>

  <!-- Offsets -->
  <line x1="165" y1="100" x2="165" y2="125" stroke="black" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="170" y="115" font-family="sans-serif" font-size="7">m_name->GetMaxDrop() + m_under->GetCenterList()</text>

  <!-- Baseline -->
  <line x1="15" y1="100" x2="400" y2="100" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="350" y="95" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline</text>

</svg>
