<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <style>
      .title { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: sans-serif; font-size: 12px; fill: #7f8c8d; }
      .formula { font-family: serif; font-style: italic; font-size: 18px; }
      .box-2d { fill: #e8f4f8; stroke: #2980b9; stroke-width: 1; }
      .box-1d { fill: #fcf3cf; stroke: #f1c40f; stroke-width: 1; }
      .limit-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 5,3; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Step 1: Initial 2D Form -->
  <g transform="translate(50, 40)">
    <text x="0" y="0" class="title">1. Initial 2D Object (Too Wide)</text>
    <line x1="450" y1="20" x2="450" y2="100" class="limit-line" />
    <text x="455" y="35" class="label" fill="#e74c3c">Available Width</text>
    
    <!-- Large Fraction -->
    <g transform="translate(20, 50)">
      <rect x="0" y="-30" width="500" height="60" class="box-2d" opacity="0.6" />
      <line x1="10" y1="0" x2="490" y2="0" stroke="black" stroke-width="2" />
      <text x="250" y="-10" class="formula" text-anchor="middle">very + long + numerator + that + exceeds + the + screen + width</text>
      <text x="250" y="22" class="formula" text-anchor="middle">denominator</text>
    </g>
  </g>

  <!-- Step 2: Breaking Up (Conversion to 1D) -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" class="title">2. Breaking Up (Conversion to Linear Form)</text>
    <line x1="450" y1="20" x2="450" y2="100" class="limit-line" />
    
    <g transform="translate(20, 50)">
      <!-- Linearized components -->
      <rect x="0" y="-15" width="150" height="30" class="box-1d" />
      <text x="75" y="5" class="formula" text-anchor="middle">(very + long + ...)</text>
      
      <rect x="155" y="-15" width="30" height="30" class="box-1d" />
      <text x="170" y="5" class="formula" text-anchor="middle">/</text>
      
      <rect x="190" y="-15" width="100" height="30" class="box-1d" />
      <text x="240" y="5" class="formula" text-anchor="middle">(denominator)</text>
      
      <!-- Arrow showing recursion -->
      <path d="M 50 20 Q 100 40 150 20" fill="none" stroke="#7f8c8d" marker-end="url(#arrow)" />
      <text x="100" y="45" class="label" text-anchor="middle">Recursive breakup of inner cells</text>
    </g>
  </g>

  <!-- Step 3: Line Wrapping -->
  <g transform="translate(50, 320)">
    <text x="0" y="0" class="title">3. Actual Layout (Line Wrapping)</text>
    <line x1="450" y1="20" x2="450" y2="150" class="limit-line" />
    
    <g transform="translate(20, 50)">
      <!-- Wrapped components -->
      <rect x="0" y="-15" width="120" height="30" class="box-1d" />
      <text x="60" y="5" class="formula" text-anchor="middle">(very + long</text>
      
      <rect x="125" y="-15" width="150" height="30" class="box-1d" />
      <text x="200" y="5" class="formula" text-anchor="middle">+ numerator + ...)</text>
      
      <text x="455" y="5" class="label" fill="#e74c3c">Soft Line Break</text>
      <path d="M 440 -15 L 460 -15 L 460 25 L 10 25 L 10 40" fill="none" stroke="#e74c3c" stroke-dasharray="2,2" marker-end="url(#arrow)" />

      <!-- Second Line -->
      <g transform="translate(0, 50)">
        <rect x="0" y="-15" width="30" height="30" class="box-1d" />
        <text x="15" y="5" class="formula" text-anchor="middle">/</text>
        
        <rect x="35" y="-15" width="100" height="30" class="box-1d" />
        <text x="85" y="5" class="formula" text-anchor="middle">(denominator)</text>
      </g>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(400, 440)">
    <rect x="0" y="0" width="180" height="50" fill="white" stroke="#ccc" rx="5" />
    <rect x="10" y="10" width="15" height="15" class="box-2d" />
    <text x="30" y="22" class="label">2D Math Object</text>
    <rect x="10" y="30" width="15" height="15" class="box-1d" />
    <text x="30" y="42" class="label">1D/Linearized Component</text>
  </g>

</svg>
