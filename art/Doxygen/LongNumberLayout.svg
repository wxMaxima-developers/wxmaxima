<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <style>
      .title { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: sans-serif; font-size: 12px; fill: #7f8c8d; }
      .formula { font-family: serif; font-size: 18px; }
      .box-cell { fill: #fdfefe; stroke: #bdc3c7; stroke-width: 1; }
      .box-digit { fill: #fcf3cf; stroke: #f1c40f; stroke-width: 1; }
      .limit-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 5,3; }
      .highlight { fill: #e8f4f8; stroke: #2980b9; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- 1. Short Form -->
  <g transform="translate(50, 40)">
    <text x="0" y="0" class="title">1. Short Form (Default)</text>
    <rect x="20" y="15" width="200" height="30" class="box-cell" />
    <text x="30" y="35" class="formula">123456789<tspan fill="#95a5a6">...</tspan></text>
    <text x="230" y="35" class="label">m_numStart + m_ellipsis</text>
  </g>

  <!-- 2. Long Form - Single Line -->
  <g transform="translate(50, 120)">
    <text x="0" y="0" class="title">2. Long Form (Single 2D Object)</text>
    <line x1="450" y1="15" x2="450" y2="70" class="limit-line" />
    <rect x="20" y="25" width="500" height="30" class="highlight" opacity="0.5" />
    <text x="30" y="45" class="formula">12345678901234567890123456789012345678901234567890...</text>
    <text x="20" y="75" class="label">Too wide for available space (red line)</text>
  </g>

  <!-- 3. Broken Up into DigitCells -->
  <g transform="translate(50, 230)">
    <text x="0" y="0" class="title">3. Broken Up (DigitCells)</text>
    <line x1="450" y1="15" x2="450" y2="130" class="limit-line" />
    
    <!-- First Line of DigitCells -->
    <g transform="translate(20, 30)">
      <rect x="0" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label">1</text>
      <rect x="15" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(15,0)">2</text>
      <rect x="30" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(30,0)">3</text>
      <rect x="45" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(45,0)">4</text>
      <rect x="60" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(60,0)">5</text>
      <text x="85" y="18" class="formula">...</text>
      <rect x="410" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(410,0)">9</text>
      <rect x="425" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(425,0)">0</text>
    </g>

    <!-- Line Wrap Arrow -->
    <path d="M 460 45 L 480 45 L 480 75 L 10 75 L 10 95" fill="none" stroke="#e74c3c" stroke-dasharray="2,2" marker-end="url(#arrow)" />
    <text x="485" y="65" class="label" fill="#e74c3c">Line Wrapping</text>

    <!-- Second Line of DigitCells -->
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label">1</text>
      <rect x="15" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(15,0)">2</text>
      <rect x="30" y="0" width="15" height="25" class="box-digit" /> <text x="4" y="18" class="label" transform="translate(30,0)">3</text>
      <text x="55" y="18" class="formula">...</text>
    </g>

    <text x="20" y="150" class="label">Conversion of LongNumberCell to a list of individual DigitCells</text>
  </g>

</svg>
