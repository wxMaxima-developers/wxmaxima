<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="150" viewBox="0 0 500 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Linear diff representation -->
  <text x="50" y="75" font-family="serif" font-size="24" fill="#2c3e50">diff(</text>
  
  <!-- function -->
  <rect x="100" y="45" width="100" height="40" fill="#e8f4f8" stroke="#2980b9" />
  <text x="150" y="72" font-family="serif" font-style="italic" font-size="18" text-anchor="middle">function</text>
  
  <text x="205" y="75" font-family="serif" font-size="24" fill="#2c3e50">,</text>
  
  <!-- d/dx -->
  <rect x="220" y="45" width="60" height="40" fill="#fcf3cf" stroke="#f1c40f" />
  <text x="250" y="72" font-family="serif" font-style="italic" font-size="18" text-anchor="middle">x</text>
  
  <text x="285" y="75" font-family="serif" font-size="24" fill="#2c3e50">)</text>

  <!-- Title -->
  <text x="250" y="25" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Linear (Broken-Up) Form</text>

  <!-- Baseline -->
  <line x1="20" y1="75" x2="480" y2="75" stroke="#7f8c8d" stroke-dasharray="5,5" />
  <text x="410" y="85" font-family="sans-serif" font-size="12" fill="#7f8c8d">Baseline</text>

</svg>
