name: compile_windows

on: [push]

env:
  BUILD_TYPE: Release
  WXVERSION: 3.3.2

permissions:
  contents: read

jobs:
  compile_windows:
    name: Compile using minGW
    permissions:
      contents: write  # for actions/create-release to create a release
    runs-on: windows-latest
    steps:
      - name: Checkout wxMaxima
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
          path: wxMaxima

      - name: Install NSIS
        uses: repolevedavaj/install-nsis@v1.2.1
        with:
          nsis-version: '3.12'

      - name: Cache wxWidgets
        uses: actions/cache@v6
        env:
          cache-name: cache-wxWidgets
        with:
          path: wxWidgets-${{env.WXVERSION}}
          # The key MUST include WXVERSION: the cached path is version-specific, so
          # after a version bump the old cache no longer matches and -- because
          # cache keys are immutable and this one already exists -- a new build can
          # never be saved under it, giving a permanent cache miss (a ~30 min
          # wxWidgets rebuild every run). The MSVC job below versions its key too.
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ env.WXVERSION }}-3

      # multi-job compilation is broken in wxWidgets, see https://trac.wxwidgets.org/ticket/19029
      # compiling wxWidgets via cmake works, but the result isn't detected by cmake any more.
      - name: Compile wxWidgets
        run: |
            if (Test-Path wxWidgets-${{env.WXVERSION}}) { echo "wxWidgets already present"} else {
               Invoke-WebRequest -Uri https://github.com/wxWidgets/wxWidgets/releases/download/v${{env.WXVERSION}}/wxWidgets-${{env.WXVERSION}}.zip -OutFile wxWidgets-${{env.WXVERSION}}.zip
               Expand-Archive -LiteralPath wxWidgets-${{env.WXVERSION}}.zip -DestinationPath wxWidgets-${{env.WXVERSION}}
               cd wxWidgets-${{env.WXVERSION}}
               cd build
               cd msw
               mingw32-make -f makefile.gcc SHELL=cmd.exe SHARED=0 BUILD=release
               cd ..
               cd ..
               cd ..
            }

      - name: Install Maxima and gnuplot
        # Maxima must be installed *before* the configure step so cmake's
        # find_program(MAXIMA maxima) picks it up and registers the Maxima-driven
        # integration tests. gnuplot is installed too (the Linux job installs it
        # as well): wxMaxima invokes plain "gnuplot" from PATH (and probes it at
        # startup), and the plotting tutorials need it -- without it those tests
        # stall. continue-on-error keeps a hiccup in the (external) Chocolatey
        # packages from ever blocking the release/packaging path below.
        continue-on-error: true
        run: |
            # --- Maxima -------------------------------------------------------
            # The Chocolatey package runs Maxima's NSIS installer silently, which
            # downloads a ~150 MB .exe from SourceForge. SourceForge mirrors
            # intermittently return an HTML/rate-limit page instead of the binary,
            # so choco fails the checksum and installs nothing. Retry a few times
            # (with the search inside the loop) so a single bad mirror response no
            # longer leaves the whole job without a Maxima.
            $bat = $null
            foreach ($try in 1..3) {
              choco install maxima -y --no-progress
              # find_program() on Windows does not append .bat, and the Chocolatey
              # package ships Maxima as maxima.bat. The installer's default layout
              # is <root>\maxima-<version>\bin\maxima.bat; try that fast glob first
              # (a full-drive recursive scan is slow and flaky), then the PATH
              # shim, then a bounded recursive sweep one level deeper than the
              # historic default so a future move under Program Files still
              # resolves.
              $roots = @('C:\','C:\Program Files','C:\Program Files (x86)',"$env:LOCALAPPDATA\Programs",'C:\tools')
              $bat = Get-ChildItem -Path $roots -Filter 'maxima-*' -Directory -ErrorAction SilentlyContinue |
                       ForEach-Object { Join-Path $_.FullName 'bin\maxima.bat' } |
                       Where-Object { Test-Path $_ } | Select-Object -First 1 | ForEach-Object { Get-Item $_ }
              if (-not $bat) {
                $cmd = Get-Command maxima.bat -ErrorAction SilentlyContinue
                if ($cmd) { $bat = Get-Item $cmd.Source }
              }
              if (-not $bat) {
                $bat = Get-ChildItem -Path $roots -Filter 'maxima.bat' -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -First 1
              }
              if ($bat) { break }
              echo "::warning::maxima.bat not found after install attempt $try; retrying."
              Start-Sleep -Seconds 15
            }
            if ($bat) {
              echo "Found Maxima: $($bat.FullName)"
              "WXM_MAXIMA=$($bat.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
              $bat.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append
            } else {
              # Leave WXM_MAXIMA unset. The "Run integration tests" step below is
              # gated on it, so a genuinely missing Maxima skips those tests with a
              # loud annotation instead of hanging wxmaxima --batch for the full
              # 20-minute timeout. The release/packaging path still runs.
              echo "::error::maxima.bat not found after install; the Maxima-driven integration tests will be skipped."
            }
            # --- gnuplot ------------------------------------------------------
            choco install gnuplot -y --no-progress
            # Make sure wxMaxima's "gnuplot" resolves: the Chocolatey shim dir is
            # already on PATH, but locate gnuplot.exe and add its dir too in case
            # the package installs without a shim.
            $gp = Get-ChildItem -Path 'C:\Program Files\gnuplot','C:\ProgramData\chocolatey','C:\tools' -Filter 'gnuplot.exe' -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($gp) {
              echo "Found gnuplot: $($gp.FullName)"
              $gp.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append
            } else {
              echo "::warning::gnuplot.exe not found after install; plotting tests may stall."
            }

      - name: Configure wxMaxima
        run: |
            cd wxMaxima
            new-item build -itemtype directory
            new-item build\Release -itemtype directory
            cd build
            $env:CXXFLAGS="-Wall -Wextra"
            # Pass an explicit -DMAXIMA only when the Install Maxima step found one,
            # so a missing Maxima simply leaves the integration tests unregistered
            # instead of breaking the configure.
            $extra = @()
            if ($env:WXM_MAXIMA) { $extra += "-DMAXIMA=$($env:WXM_MAXIMA)" }
            cmake -DwxWidgets_ROOT_DIR="../../wxWidgets-${{env.WXVERSION}}" -DwxWidgets_LIB_DIR="../../wxWidgets-${{env.WXVERSION}}/lib/gcc_lib" -DwxWidgets_CONFIGURATION=mswu -DCMAKE_BUILD_TYPE=release -G "MinGW Makefiles" -DwxWidgets_USE_DEBUG=false -DwxWidgets_USE_UNICODE=true -DwxWidgets_USE_STATIC=true -DWXM_UNIT_TESTS=YES @extra -G Ninja ..
            cd ..
            cd ..
      - name: Compile wxMaxima
        run: |
            cd wxMaxima
            cd build
            cmake --build .
            cd ..
            cd ..
      - name: Run unit tests
        # Required signal: the "unittest" label selects the self-contained C++
        # unit tests (test/unit_tests/*), which need neither Maxima nor a display.
        # The Maxima-driven integration tests run later as a separate, non-blocking
        # step (see "Run integration tests").
        #
        # MenuHelpString and ButtonWrapSizer are excluded here: their standalone
        # harnesses (a wxMenu resp. a wxFrame full of wxButtons, no wxmTestApp)
        # hang (380 s timeout) only under MinGW/wxMSW -- for reasons not yet
        # diagnosed (it is NOT the manifest-check message box: that fires
        # identically for every test exe, and the others pass). The logic both
        # tests guard is cross-platform and still runs on Linux and macOS. TODO:
        # diagnose the MinGW standalone-harness hang and re-enable them here.
        run: |
            cd wxMaxima
            cd build
            ctest -L unittest -E "MenuHelpString|ButtonWrapSizer" --output-on-failure
            cd ..
            cd ..
      - name: Check Manifest file
        shell: cmd
        run: |
            cd wxMaxima
            cd build
            cd src
            dir
            "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x86\mt.exe" -manifest wxmaxima.exe.manifest -validate_manifest
      - name: Package wxMaxima
        run: |
            cd wxMaxima
            cd build
            cpack || type D:/a/wxmaxima/wxmaxima/wxMaxima/build/_CPack_Packages/win64/NSIS/NSISOutput.log
            cd ..
            cd ..
      - name: Stage runtime DLLs next to wxmaxima.exe
        # The release wxmaxima.exe is built non-static, so it depends on the MinGW
        # runtime DLLs (libstdc++-6 / libgcc_s_seh-1 / libwinpthread-1) being found
        # at launch. When the integration tests start it under ctest the loader
        # otherwise pops a modal "cannot proceed" dialog and the test hangs to the
        # watchdog (the same failure the unit-test exes had before -static). We do
        # NOT change the shipped binary; we just drop the DLLs into wxmaxima.exe's
        # own directory (searched first by the loader, so this also avoids any PATH
        # version mismatch). Test-only; no effect on the NSIS installer.
        continue-on-error: true
        run: |
            cd wxMaxima
            cd build
            # Source the DLLs from the SAME MinGW that built wxmaxima.exe (gcc's own
            # bin dir), NOT from PATH. Maxima ships its own older copies in
            # C:\maxima-*\bin, which the Install Maxima step put on PATH ahead of
            # the toolchain's; copying those next to a gcc-15-built wxmaxima.exe
            # gives an "entry point not found" loader dialog -- the 120s hang. The
            # exe's own directory is searched first, so the matching DLLs we drop
            # here win; the maxima subprocess still loads its own bin as before.
            $gccbin = Split-Path (Get-Command gcc).Source
            echo "gcc bin: $gccbin"
            foreach ($dll in @("libstdc++-6.dll","libgcc_s_seh-1.dll","libwinpthread-1.dll")) {
              $src = Join-Path $gccbin $dll
              if (Test-Path $src) { Copy-Item $src -Destination "src" -Force; echo "staged $src" }
              else { echo "::warning::$dll not found in $gccbin; wxmaxima-driven tests may hang" }
            }
            cd ..
            cd ..
      - name: Run integration tests
        # Skip cleanly (rather than hang) when the Install-Maxima step could not
        # locate maxima.bat: several of these tests launch wxmaxima --batch, which
        # is NOT gated on cmake's find_program(MAXIMA) and would otherwise block
        # waiting for a CAS that never connects until the 20-minute ceiling below.
        if: env.WXM_MAXIMA != ''
        # Maxima-driven integration tests on Windows. Promoted from experimental to
        # REQUIRED: the suite has run end-to-end reliably, with a single consistent
        # failure - multithreadtest - which is now excluded here for the same
        # documented reason the Linux jobs exclude it (several Maxima instances of
        # that one test share its MAXIMA_USERDIR and race compiling a package into
        # the same cache; a Maxima-side bug, not ours to fix in CI).
        # "--repeat after-timeout:2" retries a timed-out test once (guarding
        # against the odd Maxima-side transient) while real failures (e.g. a
        # tripped assert) still fail the job immediately. (until-pass, tried
        # first, does NOT re-run timed-out tests.)
        # Parallelism stays modest (-j 2, like the Linux job). The "unittest"
        # label (already a required step) and "needs_posix" label (the sh/xmllint/
        # unzip tests, which cannot run on Windows) are excluded; timeout-minutes
        # is a hard ceiling.
        timeout-minutes: 20
        run: |
            cd wxMaxima
            cd build
            ctest -LE "unittest|needs_posix" -E "multithreadtest" --repeat after-timeout:2 -j 2 --output-on-failure
            cd ..
            cd ..
      - name: Extract release notes from NEWS.md
        # The release body is the "Current development version" section: from
        # the top of the file down to (not including) the next top-level "# "
        # heading, which marks the previous version. Kept as its own step
        # (rather than inline in the release-publishing step below) so it can
        # be inspected in the log independent of whether publishing runs.
        if: startsWith(github.ref, 'refs/tags/Version')
        run: |
            $lines = Get-Content wxMaxima\NEWS.md
            $endIdx = $lines.Count - 1
            for ($i = 1; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^# ') { $endIdx = $i - 1; break }
            }
            $lines[1..$endIdx] | Out-File -FilePath wxMaxima\release-notes.md -Encoding utf8
      - name: Publish release
        # Only after the build AND its integration tests have passed: this
        # runs last in the job, so a build or test failure never publishes a
        # broken installer. macOS/Ubuntu attach their own artifacts to the
        # same release separately (softprops/action-gh-release creates the
        # release if this is the first job to reach it, or updates it - and
        # preserves this call's name/body either way).
        if: startsWith(github.ref, 'refs/tags/Version')
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body_path: wxMaxima/release-notes.md
          files: wxMaxima/build/*.exe
          draft: false
          prerelease: false

  MSVC:
    permissions:
      contents: read # for actions/checkout to fetch code
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Compile using MSVC
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Cache wxWidgets
        uses: actions/cache@v6
        env:
          cache-name: cache-wxWidgets
        with:
          path: wxwidgets-source
          key: ${{ runner.os }}-build-msvc-${{ env.cache-name }}-${env:WXVERSION}-1
      - name: wxWidgets
        run: |
             if (Test-Path wxwidgets-source) { echo "wxWidgets already present"} else {
                 echo "Downloading wxWidgets"
                 curl "https://github.com/wxWidgets/wxWidgets/releases/download/v${env:WXVERSION}/wxWidgets-${env:WXVERSION}.7z" -L --output wxWidgets.7z
                 echo "Unpacking wxWidgets sources"
                 7z x "wxWidgets.7z" "-owxwidgets-source" -y
                 echo "Building wxWidgets from sources"
                 cd "wxwidgets-source"
                 cmake "." -DwxUSE_WEBVIEW_EDGE=true
                 cmake --build .
                 cd .. }
      - name: Configure wxMaxima
        run: |
             mkdir build
             cd build
             $env:CXXFLAGS="/W4"
             cmake -DwxWidgets_ROOT_DIR="../wxwidgets-source" -DwxWidgets_LIB_DIR="../wxwidgets-source/lib/vc_x64_dll" -DwxWidgets_CONFIGURATION="mswud" -DCMAKE_BUILD_TYPE=${{ env.config}} ..
             cd ..
      - name: Compile wxMaxima
        run: |
             cd build
             cmake --build .
             cd ..
