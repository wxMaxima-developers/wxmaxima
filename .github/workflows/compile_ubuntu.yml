name: compile_ubuntu

on: [push]

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  compile_latest_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout_git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: install_packages
        run: |
             sudo apt-get update
             sudo apt-get install appstream cmake desktop-file-utils doxygen gettext gnuplot gnuplot-x11 graphviz libwxgtk3.2-dev libwxgtk-webview3.2-dev maxima maxima-share maxima-doc netcat-openbsd ninja-build pandoc xvfb at-spi2-core dbus dpkg-dev po4a rpmlint lintian weston rpm
      - name: configure
        run: |
             export CXXFLAGS="-Wall -Wextra -ansi -Werror -Wpedantic"
             export LANG=en_US.UTF-8
             mkdir build
             touch build build/build.ninja
             cd build
             cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Debug -DWXM_UNIT_TESTS=YES ..
             cd ..
      - name: compile
        run: |
             cd build
             cmake --build .
             cd ..
      - name: git-diff
        # run git diff to see, if the configure/build process has changed the source files (po4a can do that)
        run: git diff --compact-summary
      - name: cat_german_translation
        # output the german translation - how does it look like on Ubuntu 24.04?
        run: cat build/info/wxmaxima.de.md
      - name: update-locale
        run: |
             cd build
             cmake --build . --target update-locale
             cd ..
      - name: run_tests
        run: |
             cd build
             export HOME=`pwd`
             export CTEST_OUTPUT_ON_FAILURE=1
             # multithreadtest is excluded: on ubuntu-latest Maxima's draw package
             # fails to build its native helper ("loadfile: failed to load
             # draw.lisp" / "Your C compiler failed to compile the intermediate
             # file") when several Maxima instances start at once -- an environment
             # problem we cannot fix here. The sanitizer job already excludes it.
             # dbus-run-session: without a session bus every GTK process waits
             # out the AT-SPI accessibility bridge's 25 s D-Bus timeout at
             # startup - ~90 GUI tests each stalled ~25 s (two thirds of the
             # total test time). A real bus makes registration instant (and
             # actually enables the at-spi2-core installed above).
             GDK_BACKEND=x11 dbus-run-session -- xvfb-run -a ctest -j 2 -E "multithreadtest"
             ls -la test/test_userdirs  # check for issue #2110.
             cd ..

  compile_and_test_sanitized:
    # Builds with AddressSanitizer + UndefinedBehaviorSanitizer and runs the
    # test suite. Memory errors (use-after-free, buffer overflows) abort the
    # affected test and turn the job red; undefined-behavior findings are
    # printed to the log and reported as a warning annotation, but do not
    # fail the job (yet).
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout_git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: install_packages
        run: |
             sudo apt-get update
             sudo apt-get install appstream cmake desktop-file-utils gettext gnuplot gnuplot-x11 libwxgtk3.2-dev libwxgtk-webview3.2-dev maxima maxima-share maxima-doc netcat-openbsd ninja-build pandoc po4a xvfb at-spi2-core dbus
      - name: configure
        run: |
             export LANG=en_US.UTF-8
             mkdir build
             cd build
             cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Debug -DWXM_UNIT_TESTS=YES -DWXM_SANITIZE=address,undefined ..
      - name: compile
        run: cmake --build build
      - name: run_tests
        run: |
             cd build
             export HOME=`pwd`
             export CTEST_OUTPUT_ON_FAILURE=1
             # detect_leaks=0: GTK/Pango/Fontconfig leak reports would drown
             # out wxMaxima's own. Enabling leak detection with a suppression
             # file is a later step of the stability initiative.
             # suppressions: silences findings inside third-party libraries we
             # cannot fix (currently wxWidgets' XPM decoder doing an overlapping
             # strncpy); scoped per-library so our own code is still checked.
             export ASAN_OPTIONS=detect_leaks=0:check_initialization_order=1:strict_string_checks=1:suppressions=$GITHUB_WORKSPACE/test/asan_suppressions.txt
             export UBSAN_OPTIONS=print_stacktrace=1
             # Same exclusions as the regular test job (draw-based tests fail
             # on ubuntu-latest for unrelated reasons).
             # dbus-run-session: see the regular test job - avoids the 25 s
             # AT-SPI D-Bus timeout every GUI process otherwise pays at startup.
             GDK_BACKEND=x11 dbus-run-session -- xvfb-run -a ctest -j 2 -E "tutorial_fittingEquations|multithreadtest|tutorial_toleranceCalculations|tutorial_displaying3DCurves|tutorial_solvingEquations|testbench_simple.wxmx"
      - name: report_ubsan_findings
        if: always()
        run: |
             if grep -n "runtime error:" build/Testing/Temporary/LastTest.log; then
               echo "::warning::UndefinedBehaviorSanitizer reported issues (grep the run_tests log for 'runtime error:'). These do not fail CI yet."
             else
               echo "No UndefinedBehaviorSanitizer findings."
             fi

  compile_without_webview:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout_git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: install_packages
        run: |
             sudo apt-get update
             sudo apt-get install appstream cmake desktop-file-utils doxygen gettext gnuplot gnuplot-x11 graphviz libwxgtk3.2-dev maxima maxima-share maxima-doc netcat-openbsd ninja-build pandoc at-spi2-core po4a
      - name: configure
        run: |
             export CXXFLAGS="-Wall -Wextra -ansi -Werror"
             export LANG=en_US.UTF-8
             mkdir build
             touch build build/build.ninja
             cd build
             cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Debug -DWXM_UNIT_TESTS=YES -DWXM_DISABLE_WEBVIEW=ON ..
             cd ..
      - name: compile
        run: |
             cd build
             cmake --build .
             cd ..
      - name: update-locale
        run: |
             cd build
             cmake --build . --target update-locale
             cd ..

  compile_2204:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout_git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: install_packages
        run: |
             sudo apt-get update
             sudo apt-get install cmake gettext libwxgtk3.0-gtk3-dev libwxgtk-webview3.0-gtk3-dev pandoc make po4a
      - name: configure
        run: |
             export CXXFLAGS="-Wall -Wextra"
             export LANG=en_US.UTF-8
             mkdir build
             cd build
             cmake ..
             cd ..
      - name: compile
        run: |
             cd build
             cmake --build .
             cd ..
      - name: git-diff
        # run git diff to see, if the configure/build process has changed the source files (po4a can do that)
        run: git diff --compact-summary
      - name: cat_german_translation
        # output the german translation - how does it look like on Ubuntu 22.04?
        run: cat build/info/wxmaxima.de.md


