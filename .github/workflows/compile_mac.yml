  compile_Ninja:
    runs-on: macos-latest

    steps:
      - name: Checkout wxMaxima from git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: Install the dependencies
        run: |
             export PATH=$PATH:/usr/local/opt/gettext/bin
             export HOMEBREW_NO_AUTO_UPDATE=1
             export HOMEBREW_NO_INSTALL_CLEANUP=1
             export HOMEBREW_NO_ANALYTICS=1
             set -e
             brew install gettext ninja pandoc wxwidgets
             set +e
      - name: xcode-select
        run: |
             sudo xcode-select --reset
      - name: Configure wxMaxima
        run: |
             export CXXFLAGS="-Wall -Wextra"
             mkdir build-wxm
             cmake -S . -B build-wxm -G Ninja -DCMAKE_INSTALL_PREFIX=. -DWXM_UNIT_TESTS=YES -DCPACK_PACKAGE_CHECKSUM=SHA512
      - name: Check Info.plist
        run: |
             ls -l build-wxm/src/Info.plist
             cat build-wxm/src/Info.plist
             plutil build-wxm/src/Info.plist
      - name: Compile wxMaxima
        run: |
             cmake --build build-wxm --parallel "$(sysctl -n hw.ncpu)"
      - name: Install wxMaxima
        run: |
             cmake --install build-wxm
      - name: Package wxMaxima
        run: |
             cd build-wxm
             cpack -G DragNDrop||cpack -G DragNDrop||cpack -G DragNDrop||cpack -G DragNDrop
             cd ..
             cp build-wxm/*.dmg wxMaxima.dmg
             cp build-wxm/*.sha512 wxMaxima.dmg.sha512
      - name: Upload the dmg
        uses: actions/upload-artifact@v7
        with:
          name: wxMaxima_ia64.dmg
          path: wxMaxima.dmg
      - name: Upload the dmg checksum
        uses: actions/upload-artifact@v7
        with:
          name: wxMaxima_ia64.dmg.sha512
          path: wxMaxima.dmg.sha512

  compile_Make:
    runs-on: macos-latest

    steps:
      - name: Checkout_git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: Install the Dependencies
        run: |
             export PATH=$PATH:/usr/local/opt/gettext/bin
             export HOMEBREW_NO_AUTO_UPDATE=1
             export HOMEBREW_NO_INSTALL_CLEANUP=1
             export HOMEBREW_NO_ANALYTICS=1
             set -e
             brew install gettext pandoc wxwidgets
             set +e
      - name: configure
        run: |
             export CXXFLAGS="-Wall -Wextra"
             mkdir ../build-wxm
             cmake -S . -B ../build-wxm -DCMAKE_INSTALL_PREFIX=.
      - name: compile
        run: |
             cmake --build ../build-wxm --parallel "$(sysctl -n hw.ncpu)"
      - name: Install wxMaxima
        run: |
             cmake --install ../build-wxm
      - name: Package wxMaxima
        run: |
             cd ../build-wxm
             cpack -G DragNDrop||cpack -G DragNDrop||cpack -G DragNDrop||cpack -G DragNDrop

  compile_macports:
    runs-on: macos-latest

    steps:
      - name: Make MacPorts cachable
        run: |
             sudo mkdir /opt/local
             sudo chown -R 1001:1001 /opt/local
             sudo chmod a+rwx /opt/local
      - name: Detect macOS version
        id: macos
        run: echo "major=$(sw_vers -productVersion | cut -d. -f1)" >> "$GITHUB_OUTPUT"
      - name: Cache MacPorts
        id: cache-macports
        uses: actions/cache@v6
        with:
          path: /opt/local/
          # The macOS major version is part of the key: MacPorts binaries are
          # built per macOS release, so a cache from one macOS must not be
          # restored on another (which happens when GitHub bumps macos-latest).
          key: ${{ runner.os }}-${{ steps.macos.outputs.major }}-macports-2.12.5-${{ hashFiles('macos_build.txt') }}
      - name: Checkout wxMaxima from git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: Install macports
        env:
          MACPORTS_VERSION: "2.12.5"
          GH_TOKEN: ${{ github.token }}
        run: |
          if test -e "/opt/local/bin"; then
            echo "MacPorts already installed (restored from cache)"
          else
            os_major="${{ steps.macos.outputs.major }}"
            # MacPorts ships one installer package per macOS release, named e.g.
            # MacPorts-2.12.5-15-Sequoia.pkg or MacPorts-2.12.5-26-Tahoe.pkg.
            # Resolve the package matching this runner's macOS major version from
            # the release assets, so a future macos-latest bump needs no workflow
            # change. The previously hard-coded Sequoia .pkg started failing with
            # "installer: Error - This package is meant to be installed on
            # macOS 15." once GitHub moved macos-latest past Sequoia.
            pkg=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
                  "https://api.github.com/repos/macports/macports-base/releases/tags/v${MACPORTS_VERSION}" \
                  | grep -o "MacPorts-${MACPORTS_VERSION}-${os_major}-[A-Za-z]*\.pkg" \
                  | head -1)
            if test -z "$pkg"; then
              echo "::error::No MacPorts ${MACPORTS_VERSION} package for macOS major version ${os_major}"
              exit 1
            fi
            echo "Installing ${pkg} for macOS ${os_major}"
            aria2c "https://github.com/macports/macports-base/releases/download/v${MACPORTS_VERSION}/${pkg}"
            sudo installer -pkg "${pkg}" -target /
          fi
          echo "/opt/local/bin" >> "$GITHUB_PATH"
      # selfupdate re-syncs the whole ports tree and the dependencies are slow to
      # build from source, so skip both when the cache already restored
      # /opt/local. Bump the cache key above to force a refresh.
      - name: Update macports
        if: steps.cache-macports.outputs.cache-hit != 'true'
        run: |
          set
          sudo port selfupdate
      - name: Install dependencies
        if: steps.cache-macports.outputs.cache-hit != 'true'
        run: |
          sudo port install gettext ninja pandoc maxima gnuplot pkgconfig wxWidgets-3.2
          sudo port select wxWidgets wxWidgets-3.2
      - name: Configure wxMaxima
        run: |
             mkdir ../build-wxm
             export CXXFLAGS="-Wall -Wextra -I/opt/local/include"
             export LDFLAGS=-I/opt/local/lib
             cmake -S . -B ../build-wxm -G Ninja -DCMAKE_INSTALL_PREFIX=. -DWXM_UNIT_TESTS=YES -DWXM_DISABLE_WEBVIEW=YES
      - name: Compile wxMaxima
        run: |
             cmake --build ../build-wxm --parallel "$(sysctl -n hw.ncpu)"
      - name: Install wxMaxima
        run: |
             cmake --install ../build-wxm
      - name: Package wxMaxima
        run: |
             cd ../build-wxm
             cpack -G DragNDrop||cpack -G DragNDrop||cpack -G DragNDrop||cpack -G DragNDrop
      - name: Cleanup
        run: |
             port -f uninstall inactive || echo "No cleanup necessary"

  # The following step is for solving issue build problems mentioned in issue #2016
  # There is an 'old build system' and a 'new one'. This should check, if the configure
  # step with the "new build system" works with Xcode.
  configure_Xcode:
    runs-on: macos-latest

    steps:
      - name: Checkout wxMaxima from git
        uses: actions/checkout@v7
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 15
      - name: Install the dependencies
        run: |
             export PATH=$PATH:/usr/local/opt/gettext/bin
             export HOMEBREW_NO_AUTO_UPDATE=1
             export HOMEBREW_NO_INSTALL_CLEANUP=1
             export HOMEBREW_NO_ANALYTICS=1
             set -e
             brew install gettext ninja pandoc wxwidgets
             set +e
      - name: xcode-select
        run: |
             xcode-select -print-path
             sudo xcode-select --reset
             xcode-select -print-path
      - name: Configure wxMaxima with Xcode
        run: |
             mkdir build-wxm
             cd build-wxm
             cmake -G Xcode -DCMAKE_CXX_FLAGS="-Wall -Wextra" ..
